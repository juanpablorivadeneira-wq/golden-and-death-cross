# Desarrollo local: docker compose up --build
# UI en http://localhost:8080
services:
  backend:
    build: ./backend
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-dev-token}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-admin@example.com}
      TWELVE_DATA_KEY: ${TWELVE_DATA_KEY:-}
      SCAN_INTERVAL_MIN: ${SCAN_INTERVAL_MIN:-15}
      SCAN_MARKET_HOURS_ONLY: ${SCAN_MARKET_HOURS_ONLY:-false}
      DB_PATH: /data/monitor.db
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
