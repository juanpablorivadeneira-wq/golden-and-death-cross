# Producción en Synology (Portainer): pegar este stack y definir las
# variables de entorno en la sección "Environment variables" de Portainer.
# Reemplazar OWNER por el usuario u organización de GitHub.
services:
  backend:
    image: ghcr.io/OWNER/cross-monitor-backend:latest
    restart: unless-stopped
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL}
      TWELVE_DATA_KEY: ${TWELVE_DATA_KEY:-}
      SCAN_INTERVAL_MIN: ${SCAN_INTERVAL_MIN:-15}
      SCAN_MARKET_HOURS_ONLY: ${SCAN_MARKET_HOURS_ONLY:-false}
      DB_PATH: /data/monitor.db
    volumes:
      - cross_monitor_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/OWNER/cross-monitor-frontend:latest
    restart: unless-stopped
    # Único puerto expuesto: el Cloudflare Tunnel apunta aquí
    # (http://IP-DEL-NAS:8081 como servicio del túnel)
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cross_monitor_data:

networks:
  internal:
